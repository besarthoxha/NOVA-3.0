
<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Nova">
<meta name="theme-color" content="#060e1e">
<title>Nova 3.0 — BOLD</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060e1e;--surface:#0a1628;--surface2:#0f1f3d;--border:rgba(212,175,55,0.12);--border2:rgba(212,175,55,0.28);--gold:#d4af37;--gold2:#f0d060;--glow:rgba(212,175,55,0.1);--text:#e8edf5;--text2:#a0aec0;--text3:#4a5568;--user-bg:#0f2547;--user-border:rgba(212,175,55,0.3);--green:#10b981;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(212,175,55,0.04) 0%,transparent 60%);pointer-events:none}
#login{width:400px;background:var(--surface);border:0.5px solid var(--border2);border-radius:16px;padding:40px 36px;display:flex;flex-direction:column;gap:22px;position:relative;box-shadow:0 0 60px rgba(212,175,55,0.06)}
#login::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.login-brand{font-size:11px;font-family:'DM Mono',monospace;color:var(--gold);letter-spacing:.25em;text-align:center}
.login-title{font-size:32px;font-weight:700;letter-spacing:.08em;text-align:center}
.login-title span{color:var(--gold)}
.login-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;text-align:center;margin-top:-12px}
.l-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.l-inp{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:12px 16px;font-size:14px;font-family:'Syne',sans-serif;color:var(--text);outline:none;transition:all .2s}
.l-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,0.08)}
.l-inp::placeholder{color:var(--text3)}
.l-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:8px;color:#0a1628;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.08em;transition:all .2s;text-transform:uppercase}
.l-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,175,55,0.3)}
.l-err{font-family:'DM Mono',monospace;font-size:11px;color:var(--red);text-align:center;display:none;padding:8px;background:rgba(239,68,68,0.08);border-radius:6px;border:0.5px solid rgba(239,68,68,0.2)}
#app{display:none;width:580px;height:94vh;max-height:820px;flex-direction:column;background:var(--surface);border:0.5px solid var(--border2);border-radius:16px;overflow:hidden;position:relative;box-shadow:0 0 80px rgba(212,175,55,0.06)}
#app::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);z-index:1}
#hdr{padding:16px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,var(--surface2),var(--surface));flex-shrink:0}
#av{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:#0a1628;flex-shrink:0}
#hdr-info{flex:1}
#hname{font-size:15px;font-weight:600;letter-spacing:.06em;display:flex;align-items:center;gap:8px}
.badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase}
.badge-owner{background:rgba(212,175,55,0.15);color:var(--gold);border:0.5px solid rgba(212,175,55,0.3)}
.badge-partner{background:rgba(99,102,241,0.15);color:#818cf8;border:0.5px solid rgba(99,102,241,0.3)}
.badge-employee{background:rgba(16,185,129,0.12);color:var(--green);border:0.5px solid rgba(16,185,129,0.25)}
#hsub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:6px;margin-top:3px}
#sdot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
#hdr-actions{display:flex;gap:6px}
.hbtn{font-size:10px;font-family:'DM Mono',monospace;padding:5px 10px;border-radius:6px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.hbtn:hover{background:var(--glow);color:var(--gold)}
.hbtn.danger:hover{background:rgba(239,68,68,0.1);color:var(--red);border-color:rgba(239,68,68,0.3)}
#mbar{padding:10px 16px;border-bottom:0.5px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:44px;flex-shrink:0}
.mcard{font-size:10px;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:20px;background:var(--surface2);color:var(--text2);border:0.5px solid var(--border);display:flex;align-items:center;gap:5px;white-space:nowrap}
.mcard-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.6}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg{display:flex;gap:10px;max-width:94%;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.msg.n{align-self:flex-start}
.bbl{padding:11px 15px;border-radius:14px;font-size:13.5px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.n .bbl{background:var(--surface2);border:0.5px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.u .bbl{background:var(--user-bg);border:0.5px solid var(--user-border);border-bottom-right-radius:4px;color:#c8d8f0}
.mav{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;color:#0a1628;flex-shrink:0;align-self:flex-end}
.typing{display:flex;gap:4px;align-items:center;padding:14px 15px}
.dt{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.3;animation:bn 1.3s infinite}
.dt:nth-child(2){animation-delay:.2s}.dt:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}
.dl-row{display:flex;gap:6px;padding:4px 0 4px 38px;flex-wrap:wrap;animation:fi .2s ease}
.dl-btn{font-size:11px;font-family:'DM Mono',monospace;padding:5px 12px;border-radius:6px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s}
.dl-btn:hover{background:var(--glow);color:var(--gold);border-color:rgba(212,175,55,0.4)}
#qrow{padding:8px 16px 4px;display:flex;gap:6px;flex-wrap:wrap;border-top:0.5px solid var(--border);flex-shrink:0}
.qb{font-size:11px;font-family:'DM Mono',monospace;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.qb:hover{background:var(--glow);color:var(--gold);border-color:rgba(212,175,55,0.35)}
#iarea{padding:10px 16px 16px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
#inp{flex:1;border:0.5px solid var(--border2);border-radius:10px;padding:11px 15px;font-size:13.5px;font-family:'Syne',sans-serif;background:var(--surface2);color:var(--text);resize:none;outline:none;line-height:1.5;max-height:100px;overflow-y:auto;transition:all .2s}
#inp::placeholder{color:var(--text3)}
#inp:focus{border-color:rgba(212,175,55,0.5);box-shadow:0 0 0 3px rgba(212,175,55,0.06)}
.ibtn{width:38px;height:38px;border-radius:10px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:all .15s}
.ibtn:hover{background:var(--glow);color:var(--gold)}
#send-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#0a1628}
#send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(212,175,55,0.3)}
#send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#mic-btn.listening{background:rgba(239,68,68,0.15);border-color:var(--red);color:var(--red);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
#vstatus{display:none;padding:5px 16px;font-family:'DM Mono',monospace;font-size:10px;color:var(--red);border-top:0.5px solid var(--border);text-align:center;flex-shrink:0}
@media(max-width:600px){#app{width:100vw;height:100vh;border-radius:0;border:none}#login{width:90vw;padding:28px 24px}}
</style>
</head>
<body>
<div id="login" style="display:none">
  <div class="login-brand">BOLD Consulting</div>
  <div class="login-title">NOV<span>A</span></div>
  <div class="login-sub">Sistemi i Brendshem</div>
  <div><div class="l-label">Username</div><input class="l-inp" id="l-user" type="text" placeholder="besart" autocomplete="username" spellcheck="false"></div>
  <div><div class="l-label">Fjalekalimi</div><input class="l-inp" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
  <div class="l-err" id="l-err"></div>
  <button class="l-btn" onclick="doLogin()">Hyrje</button>
</div>

<div id="app" style="display:none">
  <div id="hdr">
    <div id="av">N</div>
    <div id="hdr-info">
      <div id="hname">NOVA <span id="role-badge"></span></div>
      <div id="hsub"><span id="sdot"></span><span id="user-label">BOLD</span></div>
    </div>
    <div id="hdr-actions">
      <input type="file" id="file-inp" accept=".xlsx,.xls,.pdf,.txt,.csv,.docx" style="display:none" onchange="uploadFile(this)">
      <button class="hbtn" id="voice-enable-btn" onclick="enableVoice()" style="background:rgba(212,175,55,0.15);color:var(--gold);border-color:rgba(212,175,55,0.4)">&#128266; zër</button>
      <button class="hbtn" onclick="document.getElementById('file-inp').click()">ngarko</button>
      <button class="hbtn" onclick="clearChat()">reset</button>
      <button class="hbtn danger" onclick="doLogout()">dil</button>
    </div>
  </div>
  <div id="mbar"><span id="mtags" style="font-size:10px;font-family:monospace;color:var(--text3)">mem://empty</span></div>
  <div id="msgs"></div>
  <div id="vstatus">duke dëgjuar...</div>
  <div id="qrow">
    <button class="qb" onclick="sq('Permbledhje e kompanise BOLD Consulting')">overview</button>
    <button class="qb" onclick="sq('Llogarite e arketushme — kush na ka borxh?')">arkëtueshme</button>
    <button class="qb" onclick="sq('Llogarite e pagueshme — kujt i kemi borxh?')">pagueshme</button>
    <button class="qb" onclick="sq('Profit and loss per muajin aktual')">P&L</button>
    <button class="qb" onclick="sq('Gjendja e arkes dhe bankes')">arka/banka</button>
    <button class="qb" onclick="sq('Cfare di per mua?')">memoria</button>
  </div>
  <div id="iarea">
    <textarea id="inp" placeholder="Shkruaj..." rows="1"></textarea>
    <button class="ibtn" id="mic-btn" onclick="toggleVoice()">&#127908;</button>
    <button class="ibtn" id="send-btn" onclick="go()">&#10148;</button>
  </div>
</div>

<script>
var BASE = 'https://chic-energy-production-90a6.up.railway.app';
var token = localStorage.getItem('nova_token');
var currentUser = null;
var mem = {notes:[],clients:[],family:[]};
var hist = [];
var busy = false;
var recognition = null;
var isListening = false;
var voiceEnabled = false;
var msgsEl = document.getElementById('msgs');
var inpEl = document.getElementById('inp');
var sbEl = document.getElementById('send-btn');

function ah() {
  return {'Content-Type':'application/json','Authorization':'Bearer '+token};
}

function api(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({}, ah(), opts.headers || {});
  return fetch(BASE + path, opts);
}

window.addEventListener('load', function() {
  var savedUser = localStorage.getItem('nova_user');
  if (token && savedUser) {
    try { currentUser = JSON.parse(savedUser); } catch(e) {}
  }
  if (token && currentUser) {
    api('/me')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d && d.username) {
          currentUser = d;
          localStorage.setItem('nova_user', JSON.stringify(d));
          loadApp();
        } else {
          localStorage.removeItem('nova_token');
          localStorage.removeItem('nova_user');
          showLogin();
        }
      })
      .catch(function() { showLogin(); });
  } else {
    showLogin();
  }
});

function showLogin() {
  document.getElementById('login').style.display = 'flex';
  initVoice();
}

document.getElementById('l-pass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  var username = document.getElementById('l-user').value.trim().toLowerCase();
  var password = document.getElementById('l-pass').value;
  var errEl = document.getElementById('l-err');
  var btn = document.querySelector('.l-btn');
  errEl.style.display = 'none';
  btn.textContent = 'Duke hyrë...';
  btn.disabled = true;
  fetch(BASE + '/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username: username, password: password})
  })
  .then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); })
  .then(function(rd) {
    btn.textContent = 'Hyrje'; btn.disabled = false;
    if (!rd.ok) { errEl.textContent = rd.data.detail || 'Gabim'; errEl.style.display = 'block'; return; }
    token = rd.data.token;
    currentUser = rd.data.user;
    localStorage.setItem('nova_token', token);
    localStorage.setItem('nova_user', JSON.stringify(rd.data.user));
    document.getElementById('login').style.display = 'none';
    loadApp();
  })
  .catch(function() {
    btn.textContent = 'Hyrje'; btn.disabled = false;
    errEl.textContent = 'Problem lidhjeje me serverin'; errEl.style.display = 'block';
  });
}

function loadApp() {
  api('/memory').then(function(r) { return r.json(); }).then(function(d) { if (d && !d.error) mem = d; }).catch(function() {});
  api('/history').then(function(r) { return r.json(); }).then(function(d) {
    if (d && d.length > 0) hist = d.map(function(m) { return {role: m.role, content: m.content}; });
  }).catch(function() {});

  if (currentUser) {
    var role = currentUser.role;
    var badge = document.getElementById('role-badge');
    badge.textContent = role === 'owner' ? 'BOLD' : role === 'partner' ? 'PARTNER' : 'STAFF';
    badge.className = 'badge badge-' + role;
    var name = currentUser.full_name.split(' ')[0];
    document.getElementById('user-label').textContent = name + ' — BOLD';
  }
  updMem();
  initVoice();
  document.getElementById('app').style.display = 'flex';
  var h = new Date().getHours();
  var n = currentUser ? (currentUser.username === 'besart' ? 'Zotëri Hoxha' : currentUser.full_name.split(' ')[0]) : 'Boss';
  addMsg('nova', h >= 9 && h < 17 ? n + ', mirëdita. Gati për punë.' : n + ', çka kemi?');
  inpEl.focus();
}

function doLogout() {
  localStorage.removeItem('nova_token'); localStorage.removeItem('nova_user');
  token = null; currentUser = null; hist = []; mem = {notes:[],clients:[],family:[]};
  msgsEl.innerHTML = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('l-pass').value = '';
}

function clearChat() {
  hist = []; msgsEl.innerHTML = '';
  api('/clear-history', {method:'POST'});
  var n = currentUser ? (currentUser.username === 'besart' ? 'Boss' : currentUser.full_name.split(' ')[0]) : 'Boss';
  addMsg('nova', 'Bisedë e re. Çka kemi, ' + n + '?');
}

function updMem() {
  var all = (mem.notes||[]).concat((mem.clients||[]).map(function(c) { return c.name || String(c); })).concat((mem.family||[]).map(function(f) { return f.name || String(f); }));
  var el = document.getElementById('mtags');
  if (all.length === 0) {
    el.innerHTML = '<span style="font-size:10px;font-family:monospace;color:var(--text3)">mem://empty</span>';
  } else {
    el.innerHTML = all.slice(0,8).map(function(n) {
      return '<span class="mcard"><span class="mcard-dot"></span>' + String(n).slice(0,24) + '</span>';
    }).join('');
  }
}

function saveMem() { api('/memory', {method:'POST', body: JSON.stringify(mem)}); }

function chkMem(text) {
  if (/^mbaje mend/i.test(text)) {
    var info = text.replace(/^mbaje mend\s*/i, '').trim();
    if (info) { mem.notes.push(info); updMem(); saveMem(); }
  }
}

function addMsg(role, text) {
  var w = document.createElement('div'); w.className = 'msg ' + (role === 'user' ? 'u' : 'n');
  if (role !== 'user') { var a = document.createElement('div'); a.className = 'mav'; a.textContent = 'N'; w.appendChild(a); }
  var b = document.createElement('div'); b.className = 'bbl'; b.textContent = text;
  w.appendChild(b); msgsEl.appendChild(w); msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyp() {
  var d = document.createElement('div'); d.className = 'msg n'; d.id = 'typ';
  var a = document.createElement('div'); a.className = 'mav'; a.textContent = 'N';
  var b = document.createElement('div'); b.className = 'bbl typing';
  b.innerHTML = '<div class="dt"></div><div class="dt"></div><div class="dt"></div>';
  d.appendChild(a); d.appendChild(b); msgsEl.appendChild(d); msgsEl.scrollTop = msgsEl.scrollHeight;
}
function remTyp() { var t = document.getElementById('typ'); if (t) t.remove(); }

function addDownloadButtons(replyText) {
  var w = document.createElement('div'); w.className = 'dl-row';
  var btn = document.createElement('button'); btn.className = 'dl-btn';
  btn.textContent = '↓ excel';
  btn.onclick = function() {
    var title = prompt('Titulli:', 'Raport BOLD') || 'Raport BOLD';
    downloadExcel(title, replyText);
  };
  w.appendChild(btn);
  msgsEl.appendChild(w); msgsEl.scrollTop = msgsEl.scrollHeight;
}

function downloadExcel(title, text) {
  addMsg('nova', 'Duke gjeneruar Excel...');
  var body = {title: title, subtitle: new Date().toLocaleDateString('sq'), headers:[], rows:[]};
  var lines = text.split('\n').filter(function(l) { return l.includes('|'); });
  if (lines.length > 2) {
    body.headers = lines[0].split('|').map(function(h) { return h.trim(); }).filter(function(h) { return h && !h.match(/^-+$/); });
    body.rows = lines.slice(2).map(function(l) {
      var cells = l.split('|').map(function(c) { return c.trim(); });
      return cells.filter(function(c) { return c; });
    }).filter(function(r) { return r.length > 0; });
  } else {
    body.headers = ['Permbajtja'];
    body.rows = text.split('\n').filter(function(l) { return l.trim(); }).map(function(l) { return [l]; });
  }
  api('/generate/excel', {method:'POST', body: JSON.stringify(body)})
    .then(function(r) { if (!r.ok) throw new Error('Export deshtoi'); return r.blob(); })
    .then(function(blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = title + '.xlsx'; a.click(); URL.revokeObjectURL(url);
      var msgs = msgsEl.querySelectorAll('.msg.n');
      var last = msgs[msgs.length-1];
      if (last && last.querySelector('.bbl').textContent.includes('Duke gjeneruar')) last.remove();
      addMsg('nova', title + '.xlsx u shkarkua.');
    })
    .catch(function(e) { addMsg('nova', 'Problem: ' + e.message); });
}

// ─── DETEKTIMI I PYETJEVE BILANC ────────────────────────
function detectBilancQuery(text) {
  var l = text.toLowerCase();

  // Llogarite e arketushme
  if (/arketushm|debitor|kush na ka borxh|kush nuk ka paguar|na ka borxh/.test(l)) return 'receivables';

  // Llogarite e pagueshme
  if (/pagueshm|kreditor|kujt i kemi borxh|kemi borxh|i detyrohem/.test(l)) return 'payables';

  // P&L
  if (/profit|loss|p&l|fitim|humbj|rezultat|te ardhura|shpenzim/.test(l)) return 'pnl';

  // Summary / overview
  if (/permbledhj|overview|snapshot|gjendj.*kompani|si eshte kompania/.test(l)) return 'summary';

  // Banka
  if (/banka|bankes|gjendj.*bank|harmonizim|procredit|npe|raiffeisen/.test(l)) return 'bank';

  // Arka
  if (/arka|arkes|gjendj.*ark|cash/.test(l)) return 'cash';

  // Arka + Banka bashke
  if (/arka.*banka|banka.*arka|para ne dore|likuiditet/.test(l)) return 'cash-bank';

  // Shitjet
  if (/shitj|fatura.*shitj|liber.*shitj/.test(l)) return 'sales';

  // Blerjet
  if (/blerj|fatura.*blerj|liber.*blerj|furnitor/.test(l)) return 'purchases';

  // Klienti specifik
  var clientMatch = l.match(/klient[a-z]*\s+([a-z\s]{2,30}?)(?:\s+(?:ne|per|nga|te)|$)/);
  if (clientMatch) return 'client-search:' + clientMatch[1].trim();

  // Klientet te gjithe
  if (/klient|liste.*klient/.test(l)) return 'clients';

  // Kontabiliteti/llogarite
  if (/kontim|llogari|account|plan kontabel/.test(l)) return 'accounts';

  return null;
}

function getCompanyDB(text) {
  var l = text.toLowerCase();
  if (/next code|nextcode/.test(l)) return 'BilancNextCode';
  if (/ag uniteti|uniteti/.test(l)) return 'BilancAGUniteti';
  if (/\bnova\b/.test(l)) return 'BilancNova';
  return 'BilancBoldConsulting';
}

function getMonthYear(text) {
  var months = {janar:1,shkurt:2,mars:3,prill:4,'maj':5,qershor:6,korrik:7,gusht:8,shtator:9,tetor:10,nentor:11,dhjetor:12};
  var result = {month:0, year:0};
  for (var m in months) {
    if (text.toLowerCase().includes(m)) { result.month = months[m]; break; }
  }
  var ym = text.match(/20\d\d/);
  if (ym) result.year = parseInt(ym[0]);
  // Nese s'ka vit, perdor vitin aktual
  if (result.month > 0 && result.year === 0) result.year = new Date().getFullYear();
  return result;
}

async function queryBilanc(type, text) {
  try {
    var company = getCompanyDB(text);
    var my = getMonthYear(text);

    if (type === 'cash-bank') {
      var cash = await api('/sql/cash?company=' + company).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
      var bank = await api('/sql/bank?company=' + company).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
      return {cash: cash, bank: bank};
    }

    if (type.startsWith('client-search:')) {
      var name = type.split(':')[1];
      return await api('/sql/clients?company=' + company + '&search=' + encodeURIComponent(name)).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
    }

    var url = '/sql/' + type + '?company=' + company;

    if (type === 'sales' || type === 'purchases' || type === 'pnl') {
      if (my.month > 0) url += '&month=' + my.month + '&year=' + my.year;
    }

    if (type === 'accounts') {
      // Detekto grupin e llogarive
      var grpMatch = text.match(/llogari\s+(\d)/i);
      if (grpMatch) url += '&group=' + grpMatch[1];
    }

    var res = await api(url);
    if (!res.ok) return null;
    return await res.json();
  } catch(e) { return null; }
}

// ─── DERGIMI I MESAZHIT ──────────────────────────────────
function go() {
  var text = inpEl.value.trim();
  if (!text || busy) return;
  inpEl.value = ''; inpEl.style.height = 'auto';
  busy = true; sbEl.disabled = true;
  addMsg('user', text);
  chkMem(text);
  hist.push({role:'user', content: text});
  showTyp();

  var bilancType = detectBilancQuery(text);
  var bilancPromise = bilancType ? queryBilanc(bilancType, text) : Promise.resolve(null);

  bilancPromise.then(function(bilancData) {
    var messages = hist.slice();
    if (bilancData) {
      var ctx = '[KONTEKST BILANC — Te dhena reale nga SQL Server]:\n' + JSON.stringify(bilancData, null, 2);
      messages = hist.slice(0, -1).concat([{role:'user', content: text + '\n\n' + ctx}]);
    }

    api('/chat', {method:'POST', body: JSON.stringify({messages: messages, memory: mem})})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.detail) throw new Error(d.detail);
      var reply = d.reply || '';
      remTyp();
      addMsg('nova', reply);
      speak(reply);

      // Shto butonin e Excel nese ka tabele ose raport
      var hasTable = reply.includes('|') && reply.split('|').length > 4;
      var hasReport = /raport|total|shuma|borxh|gjendj/i.test(reply) && reply.split('\n').length > 4;
      if (hasTable || hasReport) addDownloadButtons(reply);

      hist.push({role:'assistant', content: reply});
      api('/history', {method:'POST', body: JSON.stringify({role:'user', content: text})});
      api('/history', {method:'POST', body: JSON.stringify({role:'assistant', content: reply})});
      busy = false; sbEl.disabled = false;
    })
    .catch(function(e) {
      remTyp();
      addMsg('nova', 'Dicka shkoi keq: ' + e.message);
      busy = false; sbEl.disabled = false;
    });
  });
}

function uploadFile(input) {
  var file = input.files[0]; if (!file) return;
  addMsg('user', 'Ngarkova: ' + file.name); showTyp();
  var fd = new FormData(); fd.append('file', file);
  fetch(BASE + '/upload', {method:'POST', headers: {'Authorization':'Bearer '+token}, body: fd})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) throw new Error(d.error);
      var prompt = 'Ngarkova "' + file.name + '". Permbajtja:\n' + d.content + '\n\nAnalizo dhe me trego cfare ka.';
      hist.push({role:'user', content: prompt});
      return api('/chat', {method:'POST', body: JSON.stringify({messages: hist, memory: mem})});
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var reply = d.reply || '';
      remTyp(); addMsg('nova', reply); speak(reply);
      hist.push({role:'assistant', content: reply});
    })
    .catch(function(e) { remTyp(); addMsg('nova', 'Problem: ' + e.message); });
  input.value = '';
}

function sq(t) { inpEl.value = t; go(); }

// ─── ZERI ────────────────────────────────────────────────
function enableVoice() {
  new (window.AudioContext || window.webkitAudioContext)();
  voiceEnabled = true;
  document.getElementById('voice-enable-btn').style.display = 'none';
  addMsg('nova', 'Zëri u aktivizua.');
}

async function speak(text) {
  if (!voiceEnabled) return;
  try {
    var res = await api('/speak', {method:'POST', body: JSON.stringify({text: text})});
    if (res.ok) {
      var blob = await res.blob();
      if (blob.size > 1000) {
        var url = URL.createObjectURL(blob);
        var audio = new Audio(url);
        audio.play().catch(function() { speakBrowser(text); });
        return;
      }
    }
    speakBrowser(text);
  } catch(e) { speakBrowser(text); }
}

function speakBrowser(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'sq-AL'; utt.rate = 0.95; utt.pitch = 1.0;
  window.speechSynthesis.speak(utt);
}

inpEl.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); } });
inpEl.addEventListener('input', function() { inpEl.style.height = 'auto'; inpEl.style.height = Math.min(inpEl.scrollHeight, 100) + 'px'; });

function initVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('mic-btn').style.display = 'none'; return; }
  recognition = new SR(); recognition.lang = 'sq-AL'; recognition.continuous = false; recognition.interimResults = false;
  recognition.onresult = function(e) { inpEl.value = e.results[0][0].transcript; stopListening(); go(); };
  recognition.onerror = function() { stopListening(); };
  recognition.onend = function() { stopListening(); };
}

function toggleVoice() {
  if (isListening) { stopListening(); return; }
  isListening = true;
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('vstatus').style.display = 'block';
  if (recognition) recognition.start();
}

function stopListening() {
  isListening = false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('vstatus').style.display = 'none';
  if (recognition) { try { recognition.stop(); } catch(e) {} }
}
</script>
